name: consensus-rnd-ci

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: consensus-rnd-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract-tests:
    name: contract-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v

      - name: Compile scripts
        run: python3 -m py_compile skills/consensus-rnd-spec/scripts/*.py tests/*.py

  manifest-version-sync:
    name: manifest-version-sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check manifest version sync
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          root = Path(".")
          mapping = json.loads((root / ".version-bump.json").read_text())
          records = []
          for entry in mapping["files"]:
              document = json.loads((root / entry["path"]).read_text())
              value = document
              for segment in entry["field"].split("."):
                  value = value[int(segment)] if isinstance(value, list) else value[segment]
              records.append((entry["path"], entry["field"], value))
          versions = {value for _, _, value in records}
          if len(versions) != 1:
              raise SystemExit(f"manifest versions are not synced: {records!r}")
          print(f"MANIFEST_VERSION_SYNC_OK:{next(iter(versions))}")
          PY

  skill-degradation:
    name: skill-degradation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout native backend
        uses: actions/checkout@v4
        with:
          repository: ChronoAIProject/consensus-rnd
          ref: dev
          path: .native-backend/consensus-rnd

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run native skill degradation checker
        run: |
          skill_root=".native-backend/consensus-rnd/skills/codex-refactor-loop"
          python3 skills/consensus-rnd-spec/scripts/native_capabilities.py --skill-root "$skill_root"
          if [ -x "$skill_root/scripts/consensus-rnd-cli" ]; then
            python3 "$skill_root/scripts/consensus-rnd-cli" check-degradation --static --repo-root .native-backend/consensus-rnd
            python3 - <<'PY'
            from pathlib import Path
            import importlib.util
            spec = importlib.util.spec_from_file_location("native_capabilities", "skills/consensus-rnd-spec/scripts/native_capabilities.py")
            module = importlib.util.module_from_spec(spec)
            assert spec and spec.loader
            spec.loader.exec_module(module)
            payload = module.detect_native_capabilities(Path(".native-backend/consensus-rnd/skills/codex-refactor-loop"))
            assert payload["controller_surface"]["cli"]["supports_latest_controller"], payload
            assert payload["controller_surface"]["wakeup_runner"]["exists"], payload
            PY
          else
            test -f "$skill_root/scripts/spawn-codex.sh"
            grep -q -- '--dangerously-bypass-approvals-and-sandbox' "$skill_root/scripts/spawn-codex.sh"
            grep -q 'SPAWN: prompt=' "$skill_root/scripts/spawn-codex.sh"
          fi

      - name: Run host adapter degradation guards
        run: python3 -m unittest tests.test_plugin_structure tests.test_native_backend -v
